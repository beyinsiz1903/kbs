services:
  mongo:
    image: mongo:7
    container_name: kbs_mongo
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: kbs_backend
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_healthy
    environment:
      MONGO_URL: mongodb://mongo:27017
      DB_NAME: kbs_bridge_system
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-degistirin-bu-anahtari-uretimde-2024}
      CORS_ORIGINS: "*"
    expose:
      - "8000"

  frontend:
    build: ./frontend
    container_name: kbs_frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "5000:80"

volumes:
  mongo_data:
