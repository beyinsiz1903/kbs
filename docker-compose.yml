services:
  backend:
    build: ./backend
    container_name: kbs_backend
    restart: unless-stopped
    environment:
      # Bir kerelik uretmek icin:
      # python -c "from cryptography.fernet import Fernet; print(Fernet.generate_key().decode())"
      SESSION_ENCRYPTION_KEY: ${SESSION_ENCRYPTION_KEY:?SESSION_ENCRYPTION_KEY env variable zorunlu}
      KBS_MODE: ${KBS_MODE:-simulation}
      DATA_DIR: /data
      CORS_ORIGINS: "*"
    volumes:
      - kbs_data:/data
    expose:
      - "8000"

  frontend:
    build: ./frontend
    container_name: kbs_frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "5000:80"

volumes:
  kbs_data:
